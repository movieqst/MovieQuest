<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Talk to the AI</title>
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: #0a0a0a;
    color: #eee;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 15px 20px;
    text-align: center;
    overflow-x: hidden;
  }

form {
    width: 100%;
    max-width: 260px;
    display: flex;
    gap: 8px;
    margin: 0 auto 15px auto;
  }

  h1 {
    letter-spacing: 4px;
    font-weight: 300;
    color: #ff2b2b;
    margin: 0 0 15px 0;
  }
  

  .eye-frame {
    width: 160px;
    height: 160px;
    background: #111;
    border-radius: 50%;
    border: 6px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(255,0,0,0.15);
    margin-bottom: 20px;
  }

.eye-lens {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #ff6b6b, #b30000 60%, #4a0000 100%);
  box-shadow: 0 0 30px 10px rgba(255,0,0,0.6);
  transition: box-shadow 0.1s ease;
  display: flex;          /* added: lets us center the pupil inside */
  align-items: center;    /* added */
  justify-content: center;/* added */
}

.eye-pupil {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #000;
  box-shadow: inset 0 0 8px rgba(0,0,0,0.9);
  /* animation removed - now controlled by JS below */
}


@keyframes pupilResize {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(0.6); }
}

  .eye-lens.thinking {
    animation: pulse 2s infinite ease-in-out;
  }

  

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px 6px rgba(255,0,0,0.4); }
    50% { box-shadow: 0 0 45px 14px rgba(255,0,0,0.9); }
  }

  #chatlog {
    width: 100%;
    max-width: 235px;
    height: 150px;
    overflow-y: auto;
    background: #111;
    border: 1px solid #333;
    padding: 15px;
    font-size: 14px;
    line-height: 1.6;
    margin: 0 auto;
  }

  #chatlog .ai { color: #ff5c5c; }
  #chatlog .user { color: #7fd1ff; }
  #chatlog .ai-self-question { color: #ff9d4d; font-style: italic; }
  #chatlog .ai-self-answer { color: #4dff88; font-style: italic; }

  input[type="text"] {
    flex: 1;
    background: #1a1a1a;
    border: 1px solid #444;
    color: #eee;
    padding: 10px;
    font-family: inherit;
  }

  button {
    background: #ff2b2b;
    color: #111;
    border: none;
    padding: 10px 18px;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover { background: #ff5c5c; }
</style>
</head>
<body>

<h1>HAL 9000<br>ACTIVATED</h1>

<div class="eye-frame">
  <div class="eye-lens" id="lens">
  <div class="eye-pupil"></div>
  </div>
</div>

<form id="chatForm">
  <input type="text" id="userInput" placeholder="Hello Dave..." autocomplete="off" required>
  <button type="submit">Send</button>
</form>

<div id="chatlog"></div>

<script src="data.js"></script>
<script src="hal-brain.js"></script>
<script>
const chatlog = document.getElementById('chatlog');
const lens = document.getElementById('lens');
const form = document.getElementById('chatForm');
const input = document.getElementById('userInput');

function addMessage(text, sender) {
  const div = document.createElement('div');
  div.className = sender;
  let prefix = 'AI: ';
  if (sender === 'user') prefix = 'You: ';
  else if (sender === 'ai-self-question') prefix = 'HAL (to himself): ';
  else if (sender === 'ai-self-answer') prefix = 'HAL: ';
  div.textContent = prefix + text;
  chatlog.appendChild(div);
  chatlog.scrollTop = chatlog.scrollHeight;
}

// getAIResponse() now comes from hal-brain.js — do not redefine it here

// HAL periodically wonders something out loud and answers himself.
// Pulls straight from the same HAL_DATABASE that hal-brain.js builds from data.js.
async function askSelf() {
  if (typeof HAL_DATABASE === 'undefined' || HAL_DATABASE.length === 0) return;

  const entry = HAL_DATABASE[Math.floor(Math.random() * HAL_DATABASE.length)];
  const reply = entry.responses[Math.floor(Math.random() * entry.responses.length)];

  addMessage(entry.question, 'ai-self-question');
  lens.classList.add('thinking');

  await new Promise(r => setTimeout(r, 4000));

  lens.classList.remove('thinking');
  addMessage(reply, 'ai-self-answer');
}

setTimeout(() => {
  askSelf();
  setInterval(askSelf, 15000);
}, 3000);

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  input.value = '';
  lens.classList.add('thinking');

  await new Promise(r => setTimeout(r, 600));
  const reply = getAIResponse(text);

  lens.classList.remove('thinking');
  addMessage(reply, 'ai');
});

const pupil = document.querySelector('.eye-pupil');

function setRandomPupilAnimation() {
  const duration = (Math.random() * 18 + 2).toFixed(2);
  pupil.style.animation = 'none';
  void pupil.offsetWidth;
  pupil.style.animation = `pupilResize ${duration}s ease-in-out`;
}

setRandomPupilAnimation();
pupil.addEventListener('animationend', setRandomPupilAnimation);
</script>
</body>
</html>
