  <body>
    <div id="widget-root"><style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
  
  :root {
    --bg-dark: #0a0e17;
    --bg-card: rgba(15, 23, 42, 0.92);
    --border-glow: rgba(6, 182, 212, 0.2);
    --accent-cyan: #06b6d4;
    --accent-red: #ef4444;
    --accent-gold: #f59e0b;
    --accent-green: #22c55e;
    --accent-purple: #a855f7;
    --accent-pink: #ec4899;
    --accent-orange: #f97316;
    --accent-orange-dark: #c2410c;
    --accent-orange-light: #fb923c;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
  }
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: var(--bg-dark);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  
  .bg-particles {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--accent-cyan);
    border-radius: 50%;
    opacity: 0.15;
    animation: float 20s infinite ease-in-out;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0.05; }
    50% { transform: translateY(-120px) translateX(40px); opacity: 0.3; }
  }
  
  /* Affiliate Notice Banner */
  .affiliate-notice {
    text-align: center;
    padding: 10px 16px;
    background: rgba(239, 68, 68, 0.08);
    border-bottom: 1px solid rgba(239, 68, 68, 0.15);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 101;
  }
  
  .affiliate-notice .notice-word {
    font-size: 14px;
    font-weight: 700;
    text-decoration: underline;
    text-underline-offset: 3px;
    color: #fff;
    margin-right: 4px;
  }
  
  /* Top Nav */
  .top-nav {
    display: flex;
    justify-content: center;
    gap: 6px;
    padding: 14px 16px;
    background: linear-gradient(180deg, rgba(10,14,23,0.95) 0%, rgba(10,14,23,0.6) 100%);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(6,182,212,0.1);
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
  }
  
  .nav-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid transparent;
    background: rgba(15,23,42,0.5);
    color: var(--text-secondary);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.5px;
  }
  
  .nav-tab:hover {
    transform: translateY(-1px);
    background: rgba(255,255,255,0.03);
  }
  
  .nav-tab.active {
    border-color: var(--accent-red);
    background: rgba(239,68,68,0.12);
    color: var(--accent-red);
    box-shadow: 0 0 15px rgba(239,68,68,0.12);
  }
  
  /* Color-coded nav tabs - text color + hover box color */
  .nav-tab[data-filter="all"] {
    color: rgba(239,68,68,0.7);
  }
  .nav-tab[data-filter="all"]:hover, .nav-tab[data-filter="all"].active {
    border-color: var(--accent-red);
    color: var(--accent-red);
    background: rgba(239,68,68,0.12);
    box-shadow: 0 0 15px rgba(239,68,68,0.12);
  }
  
  .nav-tab[data-filter="text"] {
    color: rgba(6,182,212,0.7);
  }
  .nav-tab[data-filter="text"]:hover, .nav-tab[data-filter="text"].active {
    border-color: var(--accent-cyan);
    color: var(--accent-cyan);
    background: rgba(6,182,212,0.12);
    box-shadow: 0 0 15px rgba(6,182,212,0.12);
  }
  
  .nav-tab[data-filter="personal"] {
    color: rgba(236,72,153,0.7);
  }
  .nav-tab[data-filter="personal"]:hover, .nav-tab[data-filter="personal"].active {
    border-color: var(--accent-pink);
    color: var(--accent-pink);
    background: rgba(236,72,153,0.12);
    box-shadow: 0 0 15px rgba(236,72,153,0.12);
  }
  
  .nav-tab[data-filter="image"] {
    color: rgba(168,85,247,0.7);
  }
  .nav-tab[data-filter="image"]:hover, .nav-tab[data-filter="image"].active {
    border-color: var(--accent-purple);
    color: var(--accent-purple);
    background: rgba(168,85,247,0.12);
    box-shadow: 0 0 15px rgba(168,85,247,0.12);
  }
  
  .nav-tab[data-filter="audio"] {
    color: rgba(194,65,12,0.7);
  }
  .nav-tab[data-filter="audio"]:hover, .nav-tab[data-filter="audio"].active {
    border-color: var(--accent-orange-dark);
    color: var(--accent-orange-dark);
    background: rgba(194,65,12,0.12);
    box-shadow: 0 0 15px rgba(194,65,12,0.12);
  }
  
  .nav-tab[data-filter="video"] {
    color: rgba(251,146,60,0.7);
  }
  .nav-tab[data-filter="video"]:hover, .nav-tab[data-filter="video"].active {
    border-color: var(--accent-orange-light);
    color: var(--accent-orange-light);
    background: rgba(251,146,60,0.12);
    box-shadow: 0 0 15px rgba(251,146,60,0.12);
  }
  
  .nav-tab[data-filter="coding"] {
    color: rgba(34,197,94,0.7);
  }
  .nav-tab[data-filter="coding"]:hover, .nav-tab[data-filter="coding"].active {
    border-color: var(--accent-green);
    color: var(--accent-green);
    background: rgba(34,197,94,0.12);
    box-shadow: 0 0 15px rgba(34,197,94,0.12);
  }
  
  .nav-tab svg { width: 15px; height: 15px; }
  
  /* Header */
  .header {
    text-align: center;
    padding: 30px 20px 20px;
    position: relative;
    z-index: 1;
  }
  
  .header-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 5px;
    background: linear-gradient(180deg, #fff 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  
  .glow-line {
    width: 55%;
    max-width: 450px;
    height: 3px;
    margin: 0 auto 16px;
    background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
    border-radius: 50%;
    box-shadow: 0 0 20px var(--accent-red), 0 0 40px var(--accent-red);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  
  @keyframes pulse-glow {
    0%, 100% { opacity: 0.5; box-shadow: 0 0 15px var(--accent-red); }
    50% { opacity: 1; box-shadow: 0 0 35px var(--accent-red), 0 0 55px var(--accent-red); }
  }
  
  .section-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    letter-spacing: 5px;
    color: var(--accent-cyan);
    text-transform: uppercase;
  }
  
  /* Search */
  .search-container {
    max-width: 480px;
    margin: 0 auto 24px;
    position: relative;
    z-index: 1;
    padding: 0 20px;
  }
  
  .search-input {
    width: 100%;
    padding: 12px 20px 12px 44px;
    border-radius: 14px;
    border: 1px solid rgba(6,182,212,0.12);
    background: rgba(15,23,42,0.85);
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
  }
  
  .search-input:focus {
    border-color: var(--accent-cyan);
    box-shadow: 0 0 18px rgba(6,182,212,0.12);
  }
  
  .search-input::placeholder { color: var(--text-muted); }
  
  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  
  /* ===== CARDS CONTAINER - 3 COLUMNS ===== */
  .cards-container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 16px 50px;
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  
  /* ===== TOOL CARD ===== */
  .tool-card {
    background: var(--bg-card);
    border: 1px solid rgba(148,163,184,0.06);
    border-radius: 12px;
    padding: 10px 10px 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(10px);
    text-decoration: none;
    min-height: 58px;
  }
  
  .tool-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(135deg, rgba(6,182,212,0.03) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  
  .tool-card:hover {
    border-color: var(--border-glow);
    transform: translateY(-2px) scale(1.01);
    box-shadow: 0 6px 25px rgba(0,0,0,0.35), 0 0 20px rgba(6,182,212,0.06);
  }
  
  .tool-card:hover::before { opacity: 1; }
  
  /* Left: Icon + Info */
  .tool-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
    position: relative;
    z-index: 1;
  }
  
  .tool-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }
  
  .tool-info {
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  
  .tool-name {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--text-primary);
    margin-bottom: 1px;
    letter-spacing: 0.2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .tool-url {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  
  /* ===== RIGHT SIDE: INFO BOXES ===== */
  .tool-right {
    display: flex;
    gap: 4px;
    align-items: center;
    position: relative;
    z-index: 1;
    flex-shrink: 0;
  }
  
  .info-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4px 5px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.25);
    min-width: 36px;
    text-align: center;
    transition: all 0.25s ease;
    cursor: pointer;
    text-decoration: none;
  }
  
  .info-box:hover {
    transform: translateY(-2px);
    box-shadow: 0 3px 10px rgba(0,0,0,0.3);
  }
  
  .info-box-label {
    font-size: 6px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 1px;
    white-space: nowrap;
  }
  
  .info-box-value {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  
  /* Box 1: My Rating - RED */
  .box-rating {
    border-color: rgba(239, 68, 68, 0.2);
    background: rgba(239, 68, 68, 0.06);
  }
  .box-rating .info-box-label { color: var(--accent-red); }
  .box-rating .info-box-value { color: var(--accent-red); }
  .box-rating:hover {
    border-color: rgba(239, 68, 68, 0.4);
    background: rgba(239, 68, 68, 0.1);
    box-shadow: 0 3px 12px rgba(239, 68, 68, 0.15);
  }
  
  /* Box 2: Traffic/Popularity - GREY */
  .box-traffic {
    border-color: rgba(148, 163, 184, 0.2);
    background: rgba(148, 163, 184, 0.06);
  }
  .box-traffic .info-box-label { color: #94a3b8; }
  .box-traffic .info-box-value { color: #94a3b8; }
  .box-traffic:hover {
    border-color: rgba(148, 163, 184, 0.4);
    background: rgba(148, 163, 184, 0.1);
    box-shadow: 0 3px 12px rgba(148, 163, 184, 0.15);
  }
  
  /* Category buttons - color coded */
  .box-cat-text {
    border-color: rgba(6, 182, 212, 0.2);
    background: rgba(6, 182, 212, 0.06);
  }
  .box-cat-text .info-box-label,
  .box-cat-text .info-box-value { color: var(--accent-cyan); }
  .box-cat-text:hover {
    border-color: rgba(6, 182, 212, 0.4);
    background: rgba(6, 182, 212, 0.1);
    box-shadow: 0 3px 12px rgba(6, 182, 212, 0.15);
  }
  
  .box-cat-image {
    border-color: rgba(168, 85, 247, 0.2);
    background: rgba(168, 85, 247, 0.06);
  }
  .box-cat-image .info-box-label,
  .box-cat-image .info-box-value { color: var(--accent-purple); }
  .box-cat-image:hover {
    border-color: rgba(168, 85, 247, 0.4);
    background: rgba(168, 85, 247, 0.1);
    box-shadow: 0 3px 12px rgba(168, 85, 247, 0.15);
  }
  
  .box-cat-audio {
    border-color: rgba(194, 65, 12, 0.2);
    background: rgba(194, 65, 12, 0.06);
  }
  .box-cat-audio .info-box-label,
  .box-cat-audio .info-box-value { color: var(--accent-orange-dark); }
  .box-cat-audio:hover {
    border-color: rgba(194, 65, 12, 0.4);
    background: rgba(194, 65, 12, 0.1);
    box-shadow: 0 3px 12px rgba(194, 65, 12, 0.15);
  }
  
  .box-cat-video {
    border-color: rgba(251, 146, 60, 0.2);
    background: rgba(251, 146, 60, 0.06);
  }
  .box-cat-video .info-box-label,
  .box-cat-video .info-box-value { color: var(--accent-orange-light); }
  .box-cat-video:hover {
    border-color: rgba(251, 146, 60, 0.4);
    background: rgba(251, 146, 60, 0.1);
    box-shadow: 0 3px 12px rgba(251, 146, 60, 0.15);
  }
  
  .box-cat-coding {
    border-color: rgba(34, 197, 94, 0.2);
    background: rgba(34, 197, 94, 0.06);
  }
  .box-cat-coding .info-box-label,
  .box-cat-coding .info-box-value { color: var(--accent-green); }
  .box-cat-coding:hover {
    border-color: rgba(34, 197, 94, 0.4);
    background: rgba(34, 197, 94, 0.1);
    box-shadow: 0 3px 12px rgba(34, 197, 94, 0.15);
  }
  
  .box-cat-personal {
    border-color: rgba(236, 72, 153, 0.2);
    background: rgba(236, 72, 153, 0.06);
  }
  .box-cat-personal .info-box-label,
  .box-cat-personal .info-box-value { color: var(--accent-pink); }
  .box-cat-personal:hover {
    border-color: rgba(236, 72, 153, 0.4);
    background: rgba(236, 72, 153, 0.1);
    box-shadow: 0 3px 12px rgba(236, 72, 153, 0.15);
  }
  
  /* Bottom glow */
  .bottom-glow {
    width: 35%;
    max-width: 300px;
    height: 2px;
    margin: 0 auto 24px;
    background: linear-gradient(90deg, transparent, var(--accent-red), transparent);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--accent-red);
  }
  
  /* Footer */
  .footer {
    text-align: center;
    padding: 16px;
    color: var(--text-muted);
    font-size: 12px;
    letter-spacing: 1px;
    border-top: 1px solid rgba(148,163,184,0.05);
  }
  
  .no-results {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-muted);
    font-size: 16px;
    grid-column: 1 / -1;
  }
  
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: rgba(6,182,212,0.2); border-radius: 3px; }
  
  /* Tablet: 2 columns */
  @media (max-width: 900px) {
    .cards-container { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .info-box { min-width: 30px; padding: 3px 4px; }
    .info-box-label { font-size: 5.5px; }
    .info-box-value { font-size: 9px; }
  }
  
  @media (max-width: 768px) {
    .header-title { font-size: 24px; letter-spacing: 3px; }
    .nav-tab { padding: 7px 12px; font-size: 11px; }
  }
  
  /* Mobile: 1 column */
  @media (max-width: 580px) {
    .cards-container { grid-template-columns: 1fr; }
    .info-box { min-width: 36px; padding: 4px 5px; }
    .info-box-label { font-size: 6px; }
    .info-box-value { font-size: 10px; }
  }
  
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .tool-card {
    animation: fadeInUp 0.4s ease forwards;
    opacity: 0;
  }
