<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Control Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0e1a;
    color: #c9d1d9;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .affiliate-notice {
    text-align: center;
    padding: 8px 16px;
    background: #0d1117;
    border-bottom: 1px solid #1c2128;
    font-size: 14.3px;
    color: #8b949e;
    letter-spacing: 0.3px;
  }
  .affiliate-notice .notice-word {
    font-size: 16.9px;
    font-weight: 700;
    color: #ff6b6b;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .top-nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    padding: 12px 16px;
    background: #0d1117;
    border-bottom: 1px solid #1c2128;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 1.01rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    background: transparent;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .nav-tab:hover { transform: translateY(-1px); }
  .nav-tab.active {
    border-color: currentColor;
    box-shadow: 0 0 10px currentColor;
  }

  .tab-all       { color: #ff4444; }
  .tab-all:hover, .tab-all.active       { background: rgba(255,68,68,0.1); }
  .tab-chat      { color: #58a6ff; }
  .tab-chat:hover, .tab-chat.active     { background: rgba(88,166,255,0.1); }
  .tab-image     { color: #f0883e; }
  .tab-image:hover, .tab-image.active   { background: rgba(240,136,62,0.1); }
  .tab-audio     { color: #a371f7; }
  .tab-audio:hover, .tab-audio.active   { background: rgba(163,113,247,0.1); }
  .tab-video     { color: #39c5cf; }
  .tab-video:hover, .tab-video.active   { background: rgba(57,197,207,0.1); }
  .tab-code      { color: #3fb950; }
  .tab-code:hover, .tab-code.active     { background: rgba(63,185,80,0.1); }
  .tab-supercomputer  { color: #ff2d78; }
  .tab-supercomputer:hover, .tab-supercomputer.active { background: rgba(255,45,120,0.1); }
  .tab-niche     { color: #d29922; }
  .tab-niche:hover, .tab-niche.active   { background: rgba(210,153,34,0.1); }

  .header {
    text-align: center;
    padding: 25px 20px 10px;
  }
  .header h1 {
    font-size: 2.08rem;
    font-weight: 700;
    color: #e6edf3;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .header .subtitle {
    font-size: 1.82rem;
    color: #ff6b6b;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 600;
  }

  .search-bar {
    max-width: 500px;
    margin: 0 auto 20px;
    padding: 0 20px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid #1c2128;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 1.17rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus {
    border-color: #58a6ff;
  }
  .search-bar input::placeholder {
    color: #484f58;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 0 20px 20px;
    flex-wrap: wrap;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.98rem;
    color: #8b949e;
  }
  .control-group select {
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid #1c2128;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 0.98rem;
    cursor: pointer;
    outline: none;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    padding: 0 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: #161b22;
    border: 2px solid var(--accent, #1c2128);
    border-radius: 12px;
    padding: 18px;
    transition: all 0.25s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent, #58a6ff);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .card:hover::before {
    opacity: 1;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
    padding-right: 70px;
  }
  .card-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.69rem;
    background: var(--accent-bg, rgba(88,166,255,0.1));
    flex-shrink: 0;
  }
  .card-title {
    font-size: 1.82rem;
    font-weight: 700;
    color: #e6edf3;
    line-height: 1.2;
  }
  .card-category {
    font-size: 1.18rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent, #58a6ff);
    font-weight: 600;
    margin-top: 2px;
  }

  .card-meta {
    margin-top: auto;
    margin-bottom: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .card-rating {
    display: flex;
    align-items: baseline;
    gap: 4px;
    color: #ffffff;
  }
  .card-rating-label {
    font-size: 0.635rem;
    font-weight: 600;
  }
  .card-rating-value {
    font-size: 1.27rem;
    font-weight: 700;
  }
  .card-badges {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-tag {
    font-size: 1rem;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .card-badge {
    font-size: 1.18rem;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
  }
  .badge-free {
    background: rgba(240,196,25,0.15);
    color: #f0c419;
    border: 1px solid #f0c419;
  }
  .badge-paid {
    background: rgba(139,148,158,0.15);
    color: #8b949e;
    border: 1px solid #8b949e;
  }
  .badge-affiliate {
    background: rgba(255,107,107,0.15);
    color: #ff6b6b;
    border: 1px solid #ff6b6b;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 12px;
    border-top: 1px solid #1c2128;
  }
  .card-url {
    font-size: 1.51rem;
    color: #ffffff;
    text-decoration: underline;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .card-url:hover {
    opacity: 1;
  }
  .card-traffic {
    color: #ffffff;
  }
  .card-traffic-corner {
    position: absolute;
    top: 14px;
    right: 16px;
    text-align: right;
    line-height: 1.2;
  }
  .card-traffic-label {
    display: block;
    font-size: 0.635rem;
  }
  .card-traffic-value {
    display: block;
    font-size: 1.27rem;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: #484f58;
    font-size: 1.17rem;
  }

  @media (max-width: 640px) {
    .cards-grid {
      grid-template-columns: 1fr;
      padding: 0 12px;
    }
    .header h1 {
      font-size: 1.56rem;
      letter-spacing: 2px;
    }
    .nav-tab {
      padding: 5px 10px;
      font-size: 0.91rem;
    }
  }
</style>
</head>
<body>

<div class="affiliate-notice">
  <span class="notice-word">NOTICE:</span> AFFILIATE LINKS ARE EMBEDDED. BY USING THIS APP AND CLICKING THE LINK YOU ARE PROVIDING SUPPORT. THANK YOU!
</div>

<div class="top-nav" id="topNav">
  <div class="nav-tab tab-all active" data-filter="all">● ALL</div>
  <div class="nav-tab tab-chat" data-filter="chat">💬 Chat AI</div>
  <div class="nav-tab tab-image" data-filter="image">🎨 Image AI</div>
  <div class="nav-tab tab-video" data-filter="video">🎬 Video AI</div>
  <div class="nav-tab tab-audio" data-filter="audio">🔊 Audio AI</div>
  <div class="nav-tab tab-code" data-filter="code">💻 Coding AI</div>
  <div class="nav-tab tab-supercomputer" data-filter="supercomputer">🖥️ Supercomputer AI</div>
  <div class="nav-tab tab-niche" data-filter="niche">🧩 Niche AI</div>
</div>

<div class="header">
  <h1>A I &nbsp; D A S H</h1>
  <div class="subtitle" id="appCounter">Loading...</div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search AI tools...">
</div>

<div class="controls">
  <div class="control-group">
    <label>Sort by:</label>
    <select id="sortSelect">
      <option value="rating" selected>Rating</option>
      <option value="traffic">Traffic</option>
      <option value="name">Name</option>
    </select>
  </div>
  <div class="control-group">
    <label>Filter:</label>
    <select id="filterSelect">
      <option value="all">All</option>
      <option value="free">Free Only</option>
      <option value="paid">Paid Only</option>
    </select>
  </div>
</div>

<div class="cards-grid" id="cardsGrid"></div>








<script>
const categoryColors = {
  chat:  { accent: '#58a6ff', bg: 'rgba(88,166,255,0.1)' },
  image: { accent: '#f0883e', bg: 'rgba(240,136,62,0.1)' },
  video: { accent: '#39c5cf', bg: 'rgba(57,197,207,0.1)' },
  audio: { accent: '#a371f7', bg: 'rgba(163,113,247,0.1)' },
  code:  { accent: '#3fb950', bg: 'rgba(63,185,80,0.1)' },
  supercomputer: { accent: '#ff2d78', bg: 'rgba(255,45,120,0.1)' },
  niche: { accent: '#d29922', bg: 'rgba(210,153,34,0.1)' }
};

let allData = [];
let currentFilter = 'all';
let currentSort = 'rating';
let currentFreeFilter = 'all';
let currentAffiliateFilter = false;
let searchQuery = '';

async function loadData() {
  try {
    const res = await fetch('data.json');
    allData = await res.json();
    render();
    // Set initial counter
    const counter = document.getElementById('appCounter');
    if (counter) counter.textContent = allData.length + ' AI APPS';
  } catch (e) {
    document.getElementById('cardsGrid').innerHTML = 
      '<div class="no-results">Error loading data. Please check that data.json is in the same folder.</div>';
  }
}

function formatTraffic(n) {
  let value;
  if (n >= 1000000) {
    value = (n / 1000000).toFixed(n % 1000000 === 0 ? 0 : 1) + 'M';
  } else if (n >= 1000) {
    value = Math.round(n / 1000) + 'K';
  } else {
    value = String(n);
  }
  return `<span class="card-traffic-label">DAILY TRAFFIC </span><span class="card-traffic-value">${value}</span>`;
}

function showOnly(type) {
  // Reset the visible category tabs to "All" since these are invisible/cross-category filters
  currentFilter = 'all';
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab-all').classList.add('active');

  if (type === 'free') {
    currentFreeFilter = 'free';
    currentAffiliateFilter = false;
  } else if (type === 'paid') {
    currentFreeFilter = 'paid';
    currentAffiliateFilter = false;
  } else if (type === 'affiliate') {
    currentFreeFilter = 'all';
    currentAffiliateFilter = true;
  }

  // Keep the Filter dropdown in sync
  const filterSelect = document.getElementById('filterSelect');
  if (filterSelect) filterSelect.value = currentFreeFilter;

  render();
}

function getFilteredData() {
  let data = [...allData];
  
  if (currentFilter !== 'all') {
    data = data.filter(item => item.categories.includes(currentFilter));
  }
  
  if (currentFreeFilter === 'free') {
    data = data.filter(item => item.free === true);
  } else if (currentFreeFilter === 'paid') {
    data = data.filter(item => item.free === false);
  }
  
  if (currentAffiliateFilter) {
    data = data.filter(item => item.affiliate === true);
  }
  
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = data.filter(item => 
      item.name.toLowerCase().includes(q) ||
      item.desc.toLowerCase().includes(q) ||
      item.categories.some(c => c.toLowerCase().includes(q))
    );
  }
  
  data.sort((a, b) => {
    if (currentSort === 'name') return a.name.localeCompare(b.name);
    if (currentSort === 'traffic') return b.traffic - a.traffic;
    return b.rating - a.rating;
  });
  
  // Update the counter
  const counter = document.getElementById('appCounter');
  if (counter) {
    const total = allData.length;
    const showing = data.length;
    if (currentFilter === 'all' && !searchQuery && currentFreeFilter === 'all' && !currentAffiliateFilter) {
      counter.textContent = total + ' AI APPS';
    } else {
      counter.textContent = showing + ' OF ' + total + ' AI APPS';
    }
  }
  
  return data;
}

function render() {
  const grid = document.getElementById('cardsGrid');
  const data = getFilteredData();
  
  if (data.length === 0) {
    grid.innerHTML = '<div class="no-results">No tools found matching your criteria.</div>';
    return;
  }
  
  grid.innerHTML = data.map(item => {
    const colors = categoryColors[item.categories[0]] || categoryColors.chat;
    const categoryDisplayNames = { code: 'coding', niche: 'niche ai' };
    const displayCat = c => categoryDisplayNames[c] || c;
    const categoryLabel = displayCat(item.categories[0]);
    const secondaryTags = item.categories.slice(1).map(cat => {
      const c = categoryColors[cat] || categoryColors.chat;
      return `<span class="card-tag" style="background:${c.bg};color:${c.accent};border:1px solid ${c.accent}">${displayCat(cat)}</span>`;
    }).join('');
    
    return `
      <div class="card" style="--accent:${colors.accent};--accent-bg:${colors.bg}" onclick="window.open('https://${item.url}','_blank')">
        <span class="card-traffic card-traffic-corner">${formatTraffic(item.traffic)}</span>
        <div class="card-header">
          <div class="card-icon">${item.icon}</div>
          <div>
            <div class="card-title">${item.name}</div>
            <div class="card-category">${categoryLabel}</div>
          </div>
        </div>
        <div class="card-meta">
          <div class="card-badges">
            ${secondaryTags}
            <span class="card-badge ${item.free ? 'badge-free' : 'badge-paid'}" onclick="event.stopPropagation(); showOnly('${item.free ? 'free' : 'paid'}')">${item.free ? 'Free' : 'Paid'}</span>
            ${item.affiliate ? `<span class="card-badge badge-affiliate" onclick="event.stopPropagation(); showOnly('affiliate')">Affiliate</span>` : ''}
          </div>
        </div>
        <div class="card-footer">
          <a class="card-url" href="https://${item.url}" target="_blank" onclick="event.stopPropagation()">${item.url}</a>
          <div class="card-rating"><span class="card-rating-value">${item.rating}</span><span class="card-rating-label">RATING</span></div>
        </div>
      </div>
    `;
  }).join('');
}

// Tab clicks
document.getElementById('topNav').addEventListener('click', e => {
  if (!e.target.classList.contains('nav-tab')) return;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  render();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// Sort
document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

// Free/Paid filter
document.getElementById('filterSelect').addEventListener('change', e => {
  currentFreeFilter = e.target.value;
  render();
});

loadData();
</script>

</body>
</html>
