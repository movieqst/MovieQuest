<script>
let aiTools = [];
let currentCategory = 'all';
let currentSort = 'rating';

function getCategoryClass(cat) {
  const map = { chat: 'cat-chat', image: 'cat-image', code: 'cat-code', video: 'cat-video', voice: 'cat-voice', writing: 'cat-writing' };
  return map[cat] || 'cat-chat';
}

function getCategoryLabel(cat) {
  const map = { chat: 'TXT', image: 'IMG', code: 'COD', video: 'VID', voice: 'AUD', writing: 'TXT' };
  return map[cat] || cat.toUpperCase().slice(0, 3);
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const search = document.getElementById('searchInput').value.toLowerCase();

  let filtered = aiTools.filter(t => {
    const matchCat = currentCategory === 'all' || t.category === currentCategory;
    const matchSearch = t.name.toLowerCase().includes(search) || t.desc.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });

  if (currentSort === 'rating') {
    filtered.sort((a, b) => b.rating - a.rating);
  } else {
    filtered.sort((a, b) => a.traffic - b.traffic);
  }

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="no-results">No AI tools found matching your criteria.</div>';
    return;
  }

  grid.innerHTML = filtered.map(tool => {
    const catClass = getCategoryClass(tool.category);
    const catLabel = getCategoryLabel(tool.category);
    const freeBadge = tool.free ? '<span class="badge badge-free">FREE</span>' : '<span class="badge badge-paid">PAID</span>';
    const url = 'https://' + tool.url;
    return `
      <a href="${url}" target="_blank" rel="noopener" class="card ${catClass}">
        <div class="card-icon">${tool.icon}</div>
        <div class="card-body">
          <div class="card-title-row">
            <span class="card-title">${tool.name}</span>
          </div>
          <div class="card-url">${tool.url}</div>
          <div class="card-desc">${tool.desc}</div>
          <div class="card-badges">
            <span class="badge badge-rating">${tool.rating}</span>
            <span class="badge badge-traffic">#${tool.rank}</span>
            <span class="badge badge-cat">${catLabel}</span>
            ${freeBadge}
          </div>
        </div>
      </a>
    `;
  }).join('');
}

function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.nav-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.cat === cat);
  });
  renderCards();
}

function setSort(sort) {
  currentSort = sort;
  document.getElementById('sortRating').classList.toggle('active', sort === 'rating');
  document.getElementById('sortTraffic').classList.toggle('active', sort === 'traffic');
  renderCards();
}

// Load data from external JSON file
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    aiTools = data;
    renderCards();
  })
  .catch(err => {
    document.getElementById('cardsGrid').innerHTML = '<div class="no-results">Error loading data. Please check that data.json exists.</div>';
    console.error('Failed to load data.json:', err);
  });

// Event listeners
document.getElementById('searchInput').addEventListener('input', renderCards);

document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => setCategory(tab.dataset.cat));
});

document.getElementById('sortRating').addEventListener('click', () => setSort('rating'));
document.getElementById('sortTraffic').addEventListener('click', () => setSort('traffic'));
</script>
