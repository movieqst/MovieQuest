<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0e1a;
    color: #c9d1d9;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .affiliate-notice {
    text-align: center;
    padding: 8px 16px;
    background: #0d1117;
    border-bottom: 1px solid #1c2128;
    font-size: 11px;
    color: #8b949e;
    letter-spacing: 0.3px;
  }
  .affiliate-notice .notice-word {
    font-size: 13px;
    font-weight: 700;
    color: #ff6b6b;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .top-nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    padding: 12px 16px;
    background: #0d1117;
    border-bottom: 1px solid #1c2128;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    background: transparent;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .nav-tab:hover { transform: translateY(-1px); }
  .nav-tab.active {
    border-color: currentColor;
    box-shadow: 0 0 10px currentColor;
  }

  .tab-all       { color: #ff4444; }
  .tab-all:hover, .tab-all.active       { background: rgba(255,68,68,0.1); }
  .tab-chat      { color: #58a6ff; }
  .tab-chat:hover, .tab-chat.active     { background: rgba(88,166,255,0.1); }
  .tab-image     { color: #f0883e; }
  .tab-image:hover, .tab-image.active   { background: rgba(240,136,62,0.1); }
  .tab-audio     { color: #a371f7; }
  .tab-audio:hover, .tab-audio.active   { background: rgba(163,113,247,0.1); }
  .tab-video     { color: #39c5cf; }
  .tab-video:hover, .tab-video.active   { background: rgba(57,197,207,0.1); }
  .tab-code      { color: #3fb950; }
  .tab-code:hover, .tab-code.active     { background: rgba(63,185,80,0.1); }

  .header {
    text-align: center;
    padding: 25px 20px 10px;
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #e6edf3;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .header .subtitle {
    font-size: 0.7rem;
    color: #ff6b6b;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 600;
  }

  .search-bar {
    max-width: 500px;
    margin: 0 auto 20px;
    padding: 0 20px;
  }
  .search-bar input {
    width: 100%;
    padding: 10px 16px;
    border-radius: 8px;
    border: 1px solid #1c2128;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-bar input:focus {
    border-color: #58a6ff;
  }
  .search-bar input::placeholder {
    color: #484f58;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 0 20px 20px;
    flex-wrap: wrap;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    color: #8b949e;
  }
  .control-group select {
    padding: 5px 10px;
    border-radius: 5px;
    border: 1px solid #1c2128;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 0.75rem;
    cursor: pointer;
    outline: none;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    padding: 0 20px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .card {
    background: #161b22;
    border: 1px solid #1c2128;
    border-radius: 12px;
    padding: 18px;
    transition: all 0.25s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-3px);
    border-color: #30363d;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--accent, #58a6ff);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .card:hover::before {
    opacity: 1;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    background: var(--accent-bg, rgba(88,166,255,0.1));
    flex-shrink: 0;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 700;
    color: #e6edf3;
    line-height: 1.2;
  }
  .card-category {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--accent, #58a6ff);
    font-weight: 600;
    margin-top: 2px;
  }

  .card-desc {
    font-size: 0.82rem;
    color: #8b949e;
    line-height: 1.5;
    margin-bottom: 14px;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .card-rating {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 0.85rem;
    font-weight: 700;
    color: #f0883e;
  }
  .card-rating svg {
    width: 14px;
    height: 14px;
    fill: #f0883e;
  }
  .card-badge {
    font-size: 0.65rem;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-free {
    background: rgba(63,185,80,0.15);
    color: #3fb950;
  }
  .badge-paid {
    background: rgba(255,107,107,0.15);
    color: #ff6b6b;
  }
  .card-rank {
    font-size: 0.7rem;
    color: #484f58;
    font-weight: 600;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #1c2128;
  }
  .card-url {
    font-size: 0.75rem;
    color: #58a6ff;
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .card-url:hover {
    opacity: 1;
    text-decoration: underline;
  }
  .card-traffic {
    font-size: 0.7rem;
    color: #484f58;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: #484f58;
    font-size: 0.9rem;
  }

  @media (max-width: 640px) {
    .cards-grid {
      grid-template-columns: 1fr;
      padding: 0 12px;
    }
    .header h1 {
      font-size: 1.2rem;
      letter-spacing: 2px;
    }
    .nav-tab {
      padding: 5px 10px;
      font-size: 0.7rem;
    }
  }
</style>
</head>
<body>

<div class="affiliate-notice">
  <span class="notice-word">NOTICE:</span> AFFILIATE LINKS ARE EMBEDDED. BY USING THIS APP AND CLICKING THE LINK YOU ARE PROVIDING SUPPORT. THANK YOU!
</div>

<div class="top-nav" id="topNav">
  <div class="nav-tab tab-all active" data-filter="all">● ALL</div>
  <div class="nav-tab tab-chat" data-filter="chat">💬 Chat AI</div>
  <div class="nav-tab tab-image" data-filter="image">🎨 Image AI</div>
  <div class="nav-tab tab-video" data-filter="video">🎬 Video AI</div>
  <div class="nav-tab tab-audio" data-filter="audio">🔊 Audio AI</div>
  <div class="nav-tab tab-code" data-filter="code">💻 Coding AI</div>
</div>

<div class="header">
  <h1>A I &nbsp;  C O N T R O L </h1>
  <div class="subtitle">DASHBOARD</div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search AI tools...">
</div>

<div class="controls">
  <div class="control-group">
    <label>Sort by:</label>
    <select id="sortSelect">
      <option value="rank">Rank</option>
      <option value="rating">Rating</option>
      <option value="traffic">Traffic</option>
      <option value="name">Name</option>
    </select>
  </div>
  <div class="control-group">
    <label>Filter:</label>
    <select id="filterSelect">
      <option value="all">All</option>
      <option value="free">Free Only</option>
      <option value="paid">Paid Only</option>
    </select>
  </div>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<script>
const categoryColors = {
  chat:  { accent: '#58a6ff', bg: 'rgba(88,166,255,0.1)' },
  image: { accent: '#f0883e', bg: 'rgba(240,136,62,0.1)' },
  video: { accent: '#39c5cf', bg: 'rgba(57,197,207,0.1)' },
  audio: { accent: '#a371f7', bg: 'rgba(163,113,247,0.1)' },
  code:  { accent: '#3fb950', bg: 'rgba(63,185,80,0.1)' }
};

let allData = [];
let currentFilter = 'all';
let currentSort = 'rank';
let currentFreeFilter = 'all';
let searchQuery = '';

async function loadData() {
  try {
    const res = await fetch('data.json');
    allData = await res.json();
    render();
  } catch (e) {
    document.getElementById('cardsGrid').innerHTML = 
      '<div class="no-results">Error loading data. Please check that data.json is in the same folder.</div>';
  }
}

function getFilteredData() {
  let data = [...allData];
  
  if (currentFilter !== 'all') {
    data = data.filter(item => item.category === currentFilter);
  }
  
  if (currentFreeFilter === 'free') {
    data = data.filter(item => item.free === true);
  } else if (currentFreeFilter === 'paid') {
    data = data.filter(item => item.free === false);
  }
  
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    data = data.filter(item => 
      item.name.toLowerCase().includes(q) ||
      item.desc.toLowerCase().includes(q) ||
      item.category.toLowerCase().includes(q)
    );
  }
  
  data.sort((a, b) => {
    if (currentSort === 'name') return a.name.localeCompare(b.name);
    if (currentSort === 'rating') return b.rating - a.rating;
    if (currentSort === 'traffic') return a.traffic - b.traffic;
    return a.rank - b.rank;
  });
  
  return data;
}

function render() {
  const grid = document.getElementById('cardsGrid');
  const data = getFilteredData();
  
  if (data.length === 0) {
    grid.innerHTML = '<div class="no-results">No tools found matching your criteria.</div>';
    return;
  }
  
  grid.innerHTML = data.map(item => {
    const colors = categoryColors[item.category] || categoryColors.chat;
    const star = '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
    
    return `
      <div class="card" style="--accent:${colors.accent};--accent-bg:${colors.bg}" onclick="window.open('https://${item.url}','_blank')">
        <div class="card-header">
          <div class="card-icon">${item.icon}</div>
          <div>
            <div class="card-title">${item.name}</div>
            <div class="card-category">${item.category}</div>
          </div>
        </div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-meta">
          <div class="card-rating">${star} ${item.rating}</div>
          <span class="card-badge ${item.free ? 'badge-free' : 'badge-paid'}">${item.free ? 'Free' : 'Paid'}</span>
          <span class="card-rank">#${item.rank}</span>
        </div>
        <div class="card-footer">
          <a class="card-url" href="https://${item.url}" target="_blank" onclick="event.stopPropagation()">${item.url}</a>
          <span class="card-traffic">Traffic: ${item.traffic}</span>
        </div>
      </div>
    `;
  }).join('');
}

// Tab clicks
document.getElementById('topNav').addEventListener('click', e => {
  if (!e.target.classList.contains('nav-tab')) return;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  render();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// Sort
document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  render();
});

// Free/Paid filter
document.getElementById('filterSelect').addEventListener('change', e => {
  currentFreeFilter = e.target.value;
  render();
});

loadData();
</script>

</body>
</html>
