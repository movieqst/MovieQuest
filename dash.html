<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Control Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0e1a;
    color: #c9d1d9;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .affiliate-notice {
    text-align: center;
    padding: 8px 16px;
    background: #0d1117;
    border-bottom: 1px solid #1c2128;
    font-size: 11px;
    color: #8b949e;
    letter-spacing: 0.3px;
  }
  .affiliate-notice .notice-word {
    font-size: 13px;
    font-weight: 700;
    color: #ff6b6b;
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  .top-nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    padding: 12px 16px;
    background: #0d1117;
    border-bottom: 1px solid #1c2128;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-tab {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    border: 1px solid transparent;
    background: transparent;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .nav-tab:hover { transform: translateY(-1px); }
  .nav-tab.active {
    border-color: currentColor;
    box-shadow: 0 0 10px currentColor;
  }

  .tab-all       { color: #ff4444; }
  .tab-all:hover, .tab-all.active       { background: rgba(255,68,68,0.1); }
  .tab-chat      { color: #58a6ff; }
  .tab-chat:hover, .tab-chat.active     { background: rgba(88,166,255,0.1); }
  .tab-personal  { color: #f778ba; }
  .tab-personal:hover, .tab-personal.active { background: rgba(247,120,186,0.1); }
  .tab-image     { color: #f0883e; }
  .tab-image:hover, .tab-image.active   { background: rgba(240,136,62,0.1); }
  .tab-audio     { color: #a371f7; }
  .tab-audio:hover, .tab-audio.active   { background: rgba(163,113,247,0.1); }
  .tab-video     { color: #39c5cf; }
  .tab-video:hover, .tab-video.active   { background: rgba(57,197,207,0.1); }
  .tab-code      { color: #3fb950; }
  .tab-code:hover, .tab-code.active     { background: rgba(63,185,80,0.1); }

  .header {
    text-align: center;
    padding: 25px 20px 10px;
  }
  .header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #e6edf3;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .header .subtitle {
    font-size: 0.7rem;
    color: #ff6b6b;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 600;
  }
